<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APlus Cafe — Coffee &amp; Pastry</title>
    <meta name="description" content="Where every cup tells a story. Order coffee, pastries, and meals for delivery, pickup, or dine-in at APlus Cafe." />
    <meta name="author" content="APlus Cafe" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/aplus_logo.png" />
    <link rel="apple-touch-icon" href="/aplus_logo.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:title" content="APlus Cafe — Coffee & Pastry" />
    <meta property="og:description" content="Where every cup tells a story. Order coffee, pastries, and meals for delivery, pickup, or dine-in." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aplus-cafe.vercel.app" />
    <meta property="og:image" content="https://aplus-cafe.vercel.app/aplus_logo.png" />
    <meta property="og:site_name" content="APlus Cafe" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="APlus Cafe — Coffee & Pastry" />
    <meta name="twitter:description" content="Where every cup tells a story. Order coffee, pastries, and meals for delivery, pickup, or dine-in." />
    <meta name="twitter:image" content="https://aplus-cafe.vercel.app/aplus_logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
